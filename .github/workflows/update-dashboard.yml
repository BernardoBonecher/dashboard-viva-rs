name: Atualizar dashboard

on:
  push:
    branches: [main]
    paths-ignore:
      - "instagram_history.json"   # evita loop: o próprio workflow commita esse arquivo
  schedule:
    # 08:00 UTC = 05:00 BRT, todos os dias. Ajuste se quiser outro horário.
    - cron: "0 8 * * *"
  workflow_dispatch:  # permite rodar manualmente pela aba Actions

permissions:
  contents: write   # precisa de write pra commitar o snapshot diário do IG
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GA4 credentials from secret
        env:
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
        run: |
          mkdir -p credentials
          printf '%s' "$GA4_CREDENTIALS_JSON" > credentials/ga4-viva-rs.json

      - name: Fetch Instagram data
        env:
          IG_BUSINESS_ID: ${{ secrets.IG_BUSINESS_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python fetch_instagram.py
        continue-on-error: true   # se token expirar/falhar, segue com só GA4

      - name: Commit Instagram history snapshot
        if: hashFiles('instagram_history.json') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add instagram_history.json
          if git diff --cached --quiet; then
            echo "Sem mudanças no histórico do Instagram."
          else
            git commit -m "Atualiza snapshot diário do Instagram [skip ci]"
            git pull --rebase
            git push
          fi

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Prepare site folder
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
